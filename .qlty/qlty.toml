# LifeOps CLI Qlty Configuration - Enterprise-Grade Quality
# For configuration: https://qlty.sh/d/config

config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/node_modules/**",
  "**/target/**",
  "**/vendor/**",
  "**/coverage/**",
  "**/data/**",
  "**/worktrees/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
]

# Code Smells - Block mode for strict enforcement
[smells]
mode = "block"

[[source]]
name = "default"
default = true

# ============================================
# Core TypeScript/JavaScript Quality Plugins
# ============================================

[[plugin]]
name = "biome"

[[plugin]]
name = "eslint"

# SonarJS rules for cognitive complexity and code smells
[[plugin]]
name = "radarlint-js"

# ============================================
# Security Scanning
# ============================================

[[plugin]]
name = "trivy"
drivers = ["config", "fs"]

[[plugin]]
name = "trufflehog"

# ============================================
# Unused Code Detection
# ============================================

[[plugin]]
name = "knip"

# ============================================
# Pattern Matching (informational)
# ============================================

[[plugin]]
name = "ripgrep"
mode = "comment"
