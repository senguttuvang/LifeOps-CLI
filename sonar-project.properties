# LifeOps CLI SonarQube Configuration
# Enterprise-grade static analysis for Effect-TS/TypeScript
#
# Quick Start:
# 1. Start SonarQube: docker run -d -p 9000:9000 sonarqube:community
# 2. Wait for startup: open http://localhost:9000 (default: admin/admin)
# 3. Create project token: Administration > Security > Users > Tokens
# 4. Run scanner: npx sonar-scanner -Dsonar.login=YOUR_TOKEN
#
# Or use the npm script: bun run quality:sonar

# ==============================================================================
# Project Identification
# ==============================================================================
sonar.projectKey=lifeops-cli
sonar.projectName=LifeOps CLI
sonar.projectVersion=1.0.0
sonar.organization=personal

# ==============================================================================
# Source Configuration
# ==============================================================================
sonar.sources=src
sonar.tests=test
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.d.ts,**/data/**,**/worktrees/**

# ==============================================================================
# TypeScript Configuration
# ==============================================================================
sonar.typescript.tsconfigPath=tsconfig.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ==============================================================================
# Code Coverage
# ==============================================================================
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/index.ts,**/main.ts

# ==============================================================================
# Duplication Detection
# ==============================================================================
sonar.cpd.exclusions=**/*.spec.ts,**/*.test.ts

# ==============================================================================
# Quality Gates - Strict Thresholds
# ==============================================================================
# These are enforced in SonarQube UI, but documented here for reference:
#
# - Coverage >= 80%
# - Duplicated Lines < 3%
# - Maintainability Rating = A
# - Reliability Rating = A
# - Security Rating = A
# - Bugs = 0 (on new code)
# - Vulnerabilities = 0 (on new code)
# - Code Smells < 10 (on new code)
# - Technical Debt Ratio < 5%

# ==============================================================================
# Complexity Thresholds
# ==============================================================================
# Cognitive Complexity per method: 15 (matches ESLint config)
# Cyclomatic Complexity per method: 10 (stricter than default 15)

# ==============================================================================
# Analysis Mode
# ==============================================================================
sonar.scm.provider=git
sonar.scm.disabled=false

# ==============================================================================
# External Linter Integration
# ==============================================================================
# ESLint report (if generated)
sonar.eslint.reportPaths=eslint-report.json

# ==============================================================================
# Source Encoding
# ==============================================================================
sonar.sourceEncoding=UTF-8
