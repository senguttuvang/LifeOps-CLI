name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript
        run: bun run typecheck

      - name: Biome Lint
        run: bun run lint
        continue-on-error: true  # Report but don't block yet

      - name: ESLint
        run: bun run lint:eslint
        continue-on-error: true  # Report but don't block yet

      - name: Tests
        run: bun run test

      - name: Architecture Validation
        run: bun run quality:arch
        continue-on-error: true  # Report violations but don't block yet

      - name: Dead Code Detection
        run: bun run quality:knip
        continue-on-error: true  # Report but don't block yet

  # Strict quality gate - enable when ready to enforce
